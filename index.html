<!DOCTYPE html>
<html lang="ru">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="theme-color" content="#000000" />
		<script>
			(function () {
				var colorMode = 'light';
				try {
					var cookieMatch = document.cookie.match(
						/(?:^|;\s*)recode-color-mode=(light|dark)(?:;|$)/
					);
					if (cookieMatch) {
						colorMode = cookieMatch[1];
					} else {
						var storedColorMode = localStorage.getItem('chakra-ui-color-mode');
						if (storedColorMode === 'dark' || storedColorMode === 'light') {
							colorMode = storedColorMode;
						}
					}
				} catch (error) {
					// Keep the light fallback when storage is unavailable.
				}
				document.documentElement.style.setProperty('--chakra-ui-color-mode', colorMode);
				document.documentElement.setAttribute('data-theme', colorMode);
			})();
		</script>
		<link rel="manifest" href="/manifest.json" />
		<link rel="icon" href="/favicon.ico" />
		<link rel="apple-touch-icon" sizes="76x76" href="/apple-icon.png" />
		<link rel="stylesheet" href="//cdn.jsdelivr.net/chartist.js/latest/chartist.min.css" />
		<script src="//cdn.jsdelivr.net/chartist.js/latest/chartist.min.js"></script>
		<link
			rel="stylesheet"
			href="https://cdnjs.cloudflare.com/ajax/libs/jvectormap/2.0.4/jquery-jvectormap.css"
			type="text/css"
			media="screen"
		/>
		<link
			rel="stylesheet"
			href="//cdn.datatables.net/1.10.16/css/jquery.dataTables.min.css"
			type="text/css"
			media="screen"
		/>
		<link
			href="https://use.fontawesome.com/releases/v5.0.7/css/all.css"
			rel="stylesheet"
		/>
		<link
			rel="stylesheet"
			type="text/css"
			href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700|Material+Icons"
		/>
		<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
		<title>Рекод — Личный кабинет</title>
	</head>
	<body>
		<noscript>You need to enable JavaScript to run this app.</noscript>
		<div id="root"></div>
		<script type="module" src="/src/main.jsx"></script>
	</body>
</html>
